<script type="text/javascript">
	var _timestamp = Date.now();
	//cssタグ追加
	$.each([
		'./css/_common/common.css',
		'./css/_common/base.css',
		'./css/top/Top.css',
		'./css/chara/CharaTop.css',
		'./css/chara/CharaCommon.css',
		'./css/collection/CollectionTop.css',
		'./css/collection/CharaCollection.css',
		'./css/collection/MemoriaCollection.css',
		'./css/collection/EnemyCollection.css',
		'./css/collection/DoppelCollection.css',
	], function(index, val) {
		var __link = document.createElement('link');
		__link.rel = 'stylesheet';
		__link.href = val+ '?v='+ _timestamp;
		document.head.appendChild(__link);
	});
	//jsタグ追加
	$.each([
		{
			url: './js/system/replacement.js',
			time: 1,
		},
		{
			url: './js/_common/baseConfig.js',
			time: 2,
		},
		{
			url: './js/_common/base.js',
			time: 10,
		},
	], function(index, val) {
		var __script = document.createElement('script');
		__script.src = val.url+ '?v='+ _timestamp;
		__script.charset = 'utf-8';
		__script.type = 'text/javascript';
		if(index == 0){
			__script.id = 'replaceTag';
		};
		//セットするタイミングをずらす
		setTimeout(function() {
			document.head.appendChild(__script);
		}, val.time);
	});
</script>

<!-- CharaDataテンプレート -->
<script id="tempCharaData" type="text/template">
	<% if(model.card) { %>
		<span id="attribute"><span class='type_f <%= model.card.attributeId %>'></span></span>
		<span id="rare" class='<%= model.card.rank %>'>
			<% var i = 0; %>
			<% var maxRare = model.maxRare || Number(model.card.rank.split('RANK_')[1]); %>
			<% while(i < maxRare) { %>
				<span></span>
			<% 	i=(i+1)|0; %>
			<% } %>
		</span>
		<div id="name">
			<p class="c_purple"><%= _.escape(model.card.cardName) %></p>
			<% if(model.chara.title) { %>
			<p class='title c_purple'>
				<%= model.chara.title %>
			</p>
			<% } %>
		</div>
		<p id="lv">
			<span>Lv</span>
			<span class="before">
				<span id="currentLv" class="c_purple"><%= model.level %></span>
				<span class="sla">/</span>
				<span id="currentMaxLv" class="small"><%= model.maxLevel %></span>
			</span>
			<span class="arrow hide"></span>
			<span class="after hide">
				<span id="afterLv" class="c_red"></span>
				<span class="sla">/</span>
				<span id="afterMaxLv" class="small"><%= model.maxLevel %></span>
			</span>
			<span class='lvMaxFlag'></span>
		</p>
		<div class="expGaugeWrap">
			<div class="expGaugeInner" style='width:<%= model.expRatio %>%'></div>
			<div class="expGaugeInner2" style='width:0%;'></div>
			<div class="bg"></div>
		</div>
		<div class="status">
			<ul class="statusList">
				<li>
					<span class="thStyle">HP</span>
					<span class="tdStyle"><%= model.hp %></span>
					<% if(model.addendHp || (model.composeAttribute && model.composeAttribute.composed.HP > 0)){ %>
						<span class="tdStyle c_pink">(+<%= model.addendHp + model.composeAttribute.composed.HP %>)</span>
					<% } %>
				</li>
				<li><span class="thStyle">ATK</span>
					<span class="tdStyle"><%= model.attack %></span>
					<% if(model.addendAttack || (model.composeAttribute && model.composeAttribute.composed.ATTACK > 0)){ %>
						<span class="tdStyle c_pink">(+<%= model.addendAttack + model.composeAttribute.composed.ATTACK %>)</span>
					<% } %>
				</li>
				<li>
					<span class="thStyle">DEF</span>
					<span class="tdStyle"><%= model.defense %></span>
					<% if(model.addendDefense || (model.composeAttribute && model.composeAttribute.composed.DEFENSE > 0)){ %>
						<span class="tdStyle c_pink">(+<%= model.addendDefense + model.composeAttribute.composed.DEFENSE %>)</span>
					<% } %>
				</li>
			</ul>
		</div>
		<div class="revisionWrap flexBox">
			<p class="c_gold title">魔力解放 </p><p class="num"><%= model.revision %></p>
			<ul class="flexBox revisionIcon">
				<% var i = 0;%>
				<% var RevisionMax = 3;%>
				<% var onNum = model.revision;%>
				<% var noneNum = RevisionMax - onNum;%>
				<% while(i < onNum) {%>
					<li class="on"/>
					<% i=(i+1)|0; %>
				<% } %>
				<% i = 0;%>
				<% while(i < noneNum) {%>
					<li class=""/>
					<% i=(i+1)|0; %>
				<% } %>
			</ul>
		</div>
		<div class="episodeLvWrap flexBox">
			<p class="c_gold title">エピソードLv </p><p id="episodeLv" class="num"><%= model.episodeLevel %></p>
			<% if(model.episodeLevel < 5) { %>
			<div class="bondsTotalPt c_gold">あと<%= model.epExpRequire %></div>
			<% } else { %>
			<span class='episodeLvMaxFlag'></span>
			<% } %>
		</div>
		<div class="expGaugeWrap episode">
			<div class="expGaugeInner3" style='width:<%= model.epExpRatio %>%'></div>
			<div class="expGaugeInner4" style='width:0%;'></div>
			<div class="bg"></div>
		</div>
		<div class="equipWrap flexBox">
			<p class="c_gold title">メモリア枠</p>
			<div class="flexBox before ">
				<% i = 0; %>
				<% while(i < (model.revision + 1)) { %>
					<span class="icon"></span>
				<% 	i=(i+1)|0; %>
				<% } %>
			</div>
			<div class="flexBox after ">
				<span class="icon on"></span>
			</div>
		</div>
		<div class="magiaLvWrap flexBox">
			<p class="c_gold title">マギアLv </p><p class="num"><%= model.magiaLevel %></p>
			<ul class="flexBox magiaLvIcon">
				<% i = 0;%>
				<% var MagiaLevelMax = 5;%>
				<% onNum = model.magiaLevel;%>
				<% var offNum = model.episodeLevel - model.magiaLevel;%>
				<% noneNum = MagiaLevelMax - (onNum + offNum);%>
				<% while(i < onNum) {%>
					<li class="on"/>
					<% i=(i+1)|0; %>
				<% } %>
				<% i = 0;%>
				<% while(i < offNum) {%>
					<li class="off"/>
					<% i=(i+1)|0; %>
				<% } %>
				<% i = 0;%>
				<% while(i < noneNum) {%>
					<li class="none"/>
					<% i=(i+1)|0; %>
				<% } %>
			</ul>
		</div>
	<% } %>	
</script>

				<% var offNum = model.after.episodeLevel - model.after.magiaLevel;%>

				<% i = 0;%>
				<% while(i < offNum) {%>
					<li class="off"/>
					<% i=(i+1)|0; %>
				<% } %>
				<% i = 0;%>

			<div class="flexBox after ">

			</div>

</div>
<script id="MessageTemplate" type="text/template">
	<%="<% console.log(model); %\>"%>
	<%="<% var magiaLevel = Number(model.after.episodeLevel); %\>"%>
	<%="<% var skillName  = model.after.card.cardSkill.name; %\>"%>

	<%="<% var skillDesc  = model.after.card.cardSkill.shortDescription; %\>"%>
	<%="<% var magiaDesc  = model.after.card.cardMagia.shortDescription; %\>"%>
	<%="<% var skillId    = model.after.card.cardSkill.groupId; %\>"%>
	<%="<% var magiaId    = model.after.card.cardMagia.groupId; %\>"%>

				<div class="textBox"></div>

				<div class="rowBox close">
					<div class="titleBox c_white">魔法少女ストーリー</div>

							<%="<%= model.questArr[count].section.genericIndex %\>"%>話「<%="<%= model.questArr[count].section.title %\>"%>」
						</span>
						<%="<% _.each(model.questArr[count].openConditionList,function(condition,index) { %\>"%>
							<span><%="<%= condition %\>"%></span>
						<%="<% }) %\>"%>
					</div>
				</div>
			<%="<% } else { %\>"%>
				<div class="rowBox episodeStory">
					<div class="titleBox c_white">魔法少女ストーリー解放</div>
					<div class="textBox c_white"><%="<%= model.questArr[count].section.genericIndex %\>"%>話<br>「<%="<%= model.questArr[count].section.title %\>"%>」</div>
				</div>
			<%="<% } %\>"%>
		<%="<% } %\>"%>
		<div class="rowBox episodeMagia">
			<div class="titleBox c_white">マギアLv<%="<%= magiaLevel %\>"%>&nbsp;解放</div>
			<div class="textBox c_white">強化でマギアLvを<%="<%= magiaLevel %\>"%>に上げられるようになりました</div>
		</div>
	<%="<% } %\>"%>
	<%="<% if(model.type == 'magiaLevel') { %\>"%>
		<%="<% if(model.after.magiaLevel == 5 && model.questArr && model.questArr[3]) { %\>"%>
			<%="<% if(model.questArr[3].closeFlag) { %\>"%>
				<div class="rowBox close">
					<div class="titleBox c_white">ドッペルクエスト</div>
					<div class="textBox c_white">
						<span>
							ドッペルクエスト「<%="<%= model.questArr[3].section.title %\>"%>」
						</span>
						<%="<% _.each(model.questArr[3].openConditionList,function(condition,index) { %\>"%>
							<span><%="<%= condition %\>"%></span>
						<%="<% }) %\>"%>
					</div>
				</div>
			<%="<% } else { %\>"%>
				<div class="rowBox doppel">
					<div class="titleBox c_white">ドッペルクエスト解放</div>
					<div class="textBox c_white">ドッペルクエスト<br>「<%="<%= model.questArr[3].section.title %\>"%>」</div>
				</div>
			<%="<% } %\>"%>
		<%="<% } %\>"%>
		<div class="rowBox magia">
			<div class="artIcon"><img data-nativeimgkey='icon_skill_<%="<%= magiaId %\>"%>' data-src='resource/image_native/art/icon_skill_<%="<%= magiaId %\>"%>.png'></div>
			<div class="titleBox c_white"><%="<%= magiaName %\>"%></div>
			<div class="textBox c_white"><%="<%= magiaDesc %\>"%></div>
		</div>
	<%="<% } %\>"%>
	<%="<% if(model.type === 'evolve') { %\>"%>
		<%="<% var connectClassTxt = (model.before.card.skillId !== model.after.card.skillId) ? 'skillCompose' : ''; %\>"%>
		<%="<% var magiaClassTxt = (model.before.card.magiaId !== model.after.card.magiaId) ? 'skillCompose' : ''; %\>"%>
		<div class="rowBox connect <%='<%= connectClassTxt %\>'%>">
			<div class="artIcon"><img data-nativeimgkey='icon_skill_<%="<%= skillId %\>"%>' data-src='resource/image_native/art/icon_skill_<%="<%= skillId %\>"%>.png'></div>
			<div class="titleBox c_white"><%="<%= skillName %\>"%></div>
			<div class="textBox c_white"><%="<%= skillDesc %\>"%></div>
		</div>
		<div class="rowBox magia <%='<%= magiaClassTxt %\>'%>">
			<div class="artIcon"><img data-nativeimgkey='icon_skill_<%="<%= magiaId %\>"%>' data-src='resource/image_native/art/icon_skill_<%="<%= magiaId %\>"%>.png'></div>
			<div class="titleBox c_white"><%="<%= magiaName %\>"%></div>
			<div class="textBox c_white"><%="<%= magiaDesc %\>"%></div>
		</div>
	<%="<% } %\>"%>
	<%="<% if(model.type === 'limitBreak') { %\>"%>
		<%="<% if(model.after.revision === 3 && model.after.card.pieceSkillId1 && model.after.card.maxPieceSkillId1) { %\>"%>
			<%="<% var exSkillId = model.after.card.maxPieceSkillList[0].groupId; %\>"%>
			<%="<% var exSkillName = model.after.card.maxPieceSkillList[0].name; %\>"%>
			<%="<% var exSkillDiscription = model.after.card.maxPieceSkillList[0].shortDescription; %\>"%>
			<%="<% var classTxt = (model.after.card.pieceSkillId1 !== model.after.card.maxPieceSkillId1) ? 'skillCompose' : ''; %\>"%>
			<div class="rowBox exSkill <%="<%= classTxt %\>"%>">
				<div class="artIcon"><img data-nativeimgkey='icon_skill_<%="<%= exSkillId %\>"%>' data-src='resource/image_native/art/icon_skill_<%="<%= exSkillId %\>"%>.png'></div>
				<div class="titleBox c_white"><%="<%= exSkillName %\>"%></div>
				<div class="textBox c_white"><%="<%= exSkillDiscription %\>"%></div>
			</div>
		<%="<% } %\>"%>
	<%="<% } %\>"%>
	<%="<% if(model.type === 'doppelStory') { %\>"%>
		<%="<% if(model.questArr && model.questArr[3]) { %\>"%>
			<%="<% if(model.questArr[3].closeFlag) { %\>"%>
				<div class="rowBox close">
					<div class="titleBox c_white">ドッペルクエスト</div>
					<div class="textBox c_white">
						<span>
							ドッペルクエスト「<%="<%= model.questArr[3].section.title %\>"%>」
						</span>
						<%="<% _.each(model.questArr[3].openConditionList,function(condition,index) { %\>"%>
							<span><%="<%= condition %\>"%></span>
						<%="<% }) %\>"%>
					</div>
				</div>
			<%="<% } else { %\>"%>
				<div class="rowBox doppel">
					<div class="titleBox c_white">ドッペルクエスト解放</div>
					<div class="textBox c_white">ドッペルクエスト<br>「<%="<%= model.questArr[3].section.title %\>"%>」</div>
				</div>
			<%="<% } %\>"%>
		<%="<% } %\>"%>
	<%="<% } %\>"%>
</script>
</script>

									<% while(i < noneNum) {%>

							</div>
						</div>

						<div class="thStyle">プロフィール</div>
						<div class="detail commonFrame3">
							<%= model.chara.description %>
						</div>
					</div>
					<div class="flexBox">
						<div class="exProfile1 flexBox">
							<span class="thStyle">学校</span>
							<span class="tdStyle"><%= model.chara.school %></span>
						</div>
					</div>
					<div class="exProfile2">
						<% var rankNum = String(displayCardId).split('')[4] %>
						<div class="flexBox">
							<span class="thStyle small">キャラクターデザイン</span>
							<span class="tdStyle"><%= model.chara.designer %></span>
						</div>
						<div class="flexBox">
							<span class="thStyle illustTitle">★<%= rankNum %>イラスト</span>
							<span class="illustrator tdStyle"><%= model.currentCard.card.illustrator %></span>
						</div>
						<div class="flexBox">
							<span class="thStyle">声優</span>
							<span class="tdStyle"><%= model.chara.voiceActor %></span>
						</div>
					</div>
				</div>
				<div id="charaSkill">
					<div class="commonFrame3 command">
						<p class="common_title_frame">ディスク</p>
						<ul class="commandList">
							<li class='<%= (model.currentCard.card.commandType1) ? model.currentCard.card.commandType1 : "" %>'></li>
							<li class='<%= (model.currentCard.card.commandType2) ? model.currentCard.card.commandType2 : "" %>'></li>
							<li class='<%= (model.currentCard.card.commandType3) ? model.currentCard.card.commandType3 : "" %>'></li>
							<li class='<%= (model.currentCard.card.commandType4) ? model.currentCard.card.commandType4 : "" %>'></li>
							<li class='<%= (model.currentCard.card.commandType5) ? model.currentCard.card.commandType5 : "" %>'></li>
						</ul>
					</div>
					<% if(model.currentCard.card.pieceSkillList && model.currentCard.card.pieceSkillList.length > 0) { %>
						<% var _exSkill = model.currentCard.card.pieceSkillList; %>
						<% if(model.currentCard.card.maxPieceSkillList.length > 0 && model.currentCard.revision === 3) { %>
							<% _exSkill = model.currentCard.card.maxPieceSkillList; %>
						<% } %>
						<div class="commonFrame3 connect">
							<p class="common_title_frame">EXスキル</p>
							<% _.each(_exSkill,function(m) { %>
								<div class="flexBox">
									<p class="img">
										<img data-nativeimgkey='icon_skill_<%= m.groupId %>' data-src='resource/image_native/art/icon_skill_<%= m.groupId %>.png'>
									</p>
									<div class="detailWrap">
										<p class="name c_purple"><%= m.name %></p>
										<div class="common_line lc_beige"></div>
										<p class="detail"><%= m.shortDescription %></p>
									</div>
								</div>
							<% }) %>
						</div>
					<% } %>
					<% if(model.currentCard.card.cardSkill) { %>
					<div class="commonFrame3 connect">
						<p class="common_title_frame">コネクト</p>
						<div class="flexBox">
							<p class="img">
								<img data-nativeimgkey='icon_skill_<%= model.currentCard.card.cardSkill.groupId %>' data-src='resource/image_native/art/icon_skill_<%= model.currentCard.card.cardSkill.groupId %>.png'>
							</p>
							<div class="detailWrap">
								<p class="name c_purple"><%= model.currentCard.card.cardSkill.name %></p>
								<div class="common_line lc_beige"></div>
								<p class="detail"><%= model.currentCard.card.cardSkill.shortDescription %></p>
							</div>
						</div>
					</div>
					<% } %>
					<% if(model.currentCard.card.cardMagia) { %>
					<% var MagiaLevelMax = 5;%>
					<div class="commonFrame3 magia">
						<p class="common_title_frame">マギア</p>
						<div class="border"></div>
						<p class="common_title_frame">マギア</p>
						<div class="flexBox magiaLevel">
							マギアLv<span class="c_red"><%= MagiaLevelMax %></span>
							<ul class="flexBox magiaLvIcon">
								<% i = 0;%>
								<% var MagiaLevelMax = 5;%>
								<% onNum = MagiaLevelMax;%>
								<% var offNum = 0;%>
								<% noneNum = 0;%>
								<% while(i < onNum) {%>
									<li class="on"/>
									<% i=(i+1)|0; %>
								<% } %>
								<% i = 0;%>
								<% while(i < offNum) {%>
									<li class="off"/>
									<% i=(i+1)|0; %>
								<% } %>
								<% i = 0;%>
								<% while(i < noneNum) {%>
									<li class="none"/>
									<% i=(i+1)|0; %>
								<% } %>
							</ul>
						</div>
						<div class="magiaDetail">
							<div class="flexBox">
								<p class="img">
									<img data-nativeimgkey='icon_skill_<%= model.currentCard.card.cardMagia.groupId %>' data-src='resource/image_native/art/icon_skill_<%= model.currentCard.card.cardMagia.groupId %>.png'>
								</p>
								<div class="detailWrap">
									<p class="name c_purple"><%= model.currentCard.card.cardMagia.name %></p>
									<div class="common_line lc_beige"></div>
									<p class="detail"><%= model.currentCard.card.cardMagia.shortDescription %></p>
								</div>
							</div>
						</div>
						<% if(model.currentCard.card.doppelCharaNo) { %>
							<% console.log(model); %>
							<div class="doppel doppelDetail">
								<div class="flexBox">
									<% if(model.currentCard.doppelOpenFlag && model.currentCard.card.doppelMagiaId) { %>
										<p class="img doppel">
											<img data-nativeimgkey='mini_<%= model.currentCard.card.doppelCharaNo %>_dd' data-src='resource/image_native/mini/image/mini_<%= model.currentCard.card.doppelCharaNo %>_dd.png'>
											<span class="bg"></span>
										</p>
										<div class="detailWrap">
											<p class="name c_purple"><%= model.currentCard.card.doppelCardMagia.name %></p>
											<div class="common_line lc_beige"></div>
											<p class="detail"><%= model.currentCard.card.doppelCardMagia.shortDescription %></p>
										</div>
									<% } else { %>
										<p class="img">
											<img src='./img/common/chara/icon_doppel_null.png'>
										</p>
										<div class="detailWrap">
											<p class="name c_purple">未解放</p>
											<div class="common_line lc_beige"></div>
											<p class="detail">ドッペルクエストクリアで解放</p>
										</div>
									<% } %>
								</div>
							</div>
						<% } %>
					</div>
					<% } %>
				</div>
				<div id="charaCard">
					<div class="commonFrame3">
						<p class="common_title_frame">魔法少女</p>
						<div class="flexBox">
							<% _.forEach(model.cardList,function(txt,index){ %>
								<% if(!txt.openFlag) { %>
									<div class="cardIllustWrap off">
										<div class="offIcon"></div>
										<p class="mb_pink off">★<%= txt.rankNum %></p>
									</div>
								<% } else { %>
								<div class="cardIllustWrap">
									<div class="userCharaIcon <%= txt.rank %> <%= txt.attributeId %>">
										<% att = "att_" + txt.card.attributeId.toLowerCase() %>
										<% star = "star_" + txt.card.rank.toLowerCase() %>
										<% frame = "frame_" + txt.card.rank.toLowerCase() %>
										<% bg = "bg_" + txt.card.attributeId.toLowerCase() %>
										<span class="att" data-nativebgkey="<%= att %>" data-src="resource/image_native/card/frame/<%= att %>.png"></span>
										<span class="star" data-nativebgkey="<%= star %>" data-src="resource/image_native/card/frame/<%= star %>.png"></span>
										<span class="rank" data-nativebgkey="<%= frame %>" data-src="resource/image_native/card/frame/<%= frame %>.png"></span>
										<img data-nativeimgkey="card_<%= txt.cardId %>_f" data-src='resource/image_native/card/image/card_<%= txt.cardId %>_f.png'>
										<span class="bg" data-nativebgkey="<%= bg %>" data-src="resource/image_native/card/frame/<%= bg %>.png"></span>
									</div>
									<% btnClass = (model.currentCard.cardId == txt.cardId) ? 'selected' : '' %>
									<p data-cardarrindex="<%= index %>" class="mb_pink se_decide <%= btnClass %>">★<%= txt.rankNum %></p>
								</div>
								<% } %>
							<% }) %>
						</div>
					</div>
				</div>
				<div id="charaIllust">
					<div class="commonFrame3">
						<p class="common_title_frame">ホーム衣装</p>
						<div class="live2dBtns">
							<% _.forEach(model.currentCard.live2dList,function(txt,index){ %>
								<% classTxt = (index == 0) ? "current" : ""; %>
								<div class="live2dChangeBtn se_decide commonFrame4 c_gold <%= classTxt %>" data-live2did="<%= txt.live2dId %>">
									<%= txt.description %>
								</div>
							<% }) %>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>	
</script>

<!-- MemoriaPopup テンプレート -->
<script id="tempMemoriaPopup" type="text/template">
	<span class="closeDefault se_cancel popupCloseBtn TE" id="memoriaPopClose"></span>
	<div class="whiteLine"></div>
	<div class="memoriaNameWrap <%= model.piece.pieceType %>">
		<span class="memoriaTypeIcon"></span>
		<span class="memoriaName c_white"><%= model.piece.pieceName %></span>
		<span class="memoriaTypeName"><% if(model.piece.pieceType === "SKILL"){ %>スキルタイプ<% }else{ %>アビリティタイプ<% } %></span>
	</div>
	<div id="memoriaDetailPopup">
		<div class="popupCardImage">
			<img data-nativeimgkey="memoria_<%= model.piece.pieceId %>_c" data-src="resource/image_native/memoria/memoria_<%= model.piece.pieceId %>_c.png">
		</div>
		<div class="popupDetailWrap commonFrame5 <%= model.piece.pieceType %><% if(model.btnHide == true){ %> btnHide<% } %>" id="memoriaPopScroll">
			<div class="hideArea">
			<div class="infoWrap">
				<div class="effectiveWrap">
					<dl class="equipLimited common_dl">
						<dt class="limitedTitle">装備可能</dt>
						<dd class="canEquip">
							<%
								var equipLimited;
								switch(model.piece.attributeId){
									case "ALL":
										equipLimited = "";
										break;
									case "FIRE":
										equipLimited = "火属性";
										break;
									case "WATER":
										equipLimited = "水属性";
										break;
									case "TIMBER":
										equipLimited = "木属性";
										break;
									case "LIGHT":
										equipLimited = "光属性";
										break;
									case "DARK":
										equipLimited = "闇属性";
										break;
								};
							%>
							<% if(equipLimited){ %>
								<%= equipLimited %>
							<% } %>
							<% if(model.piece.charaList) { %>
								<% _.each(model.piece.charaList,function(obj,index){ %>
									<% var name = (index !== 0) ? '、'+obj.name : obj.name; %>
									<%= _.escape(name) %>
								<% }); %>
							<% } %>
							<% if(!equipLimited && !model.piece.charaList){ %>
								すべて
							<% } %>
						</dd>
					</dl>
					<div class="memoriaHr common_line lc_beige"></div>
					<div class="cardDescription">
						<%= model.piece.description %>
					</div>
				</div>
				<div class="illustrator">
					<%= model.piece.illustrator %>
				</div>
			</div>
			</div>
			<div id="strengtheningBtn" class="sb_pink01 TE se_decide">強化</div>
			<div id="breakthroughBtn" class="sb_pink01 TE se_decide">限界突破</div>
		</div>
		<%
			var addClass = "";
			if(model.protect)            addClass  = " protected";
			if(model.unprotectLimitFlag) addClass += " cantUnlock";
		%>
		<% if(!model.lockFlg && !model.supportFlag){ %><span id="memoriaProtect" class="se_decide<%= addClass %>"><% if(model.protect){ %>ロック中<% }else{ %>ロック<% } %></span><% } %>
	</div>
</script>
