name: ntp pool

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ntp:
    name: Test NTP pool score
    runs-on: ubuntu-latest
    steps:
      - run: |
          IP="$(getent ahosts ${{ secrets.HOST }} | head -n1 | cut -d' ' -f1)"
          curl -fsSL https://www.ntppool.org/api/data/server/dns/answers/${IP} | jq '.Server|map({(.CC):del(.CC)})|add'
          curl -fsSL https://www.ntppool.org/scores/${IP}/json | jq -e '.monitors[]|select(.type=="score"and.score>10and.status=="active")'
